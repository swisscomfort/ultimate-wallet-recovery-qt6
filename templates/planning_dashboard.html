<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Dashboard - Ultimate Wallet Recovery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-bottom: 2px solid #00d4aa;
        }
        
        .header h1 {
            color: #00d4aa;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #a0a0a0;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 212, 170, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            color: #00d4aa;
            margin-bottom: 15px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: rgba(0, 212, 170, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }
        
        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
            color: #00d4aa;
            margin-bottom: 5px;
        }
        
        .stat-box .label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
        }
        
        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .task-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 3px solid #00d4aa;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .task-item.done {
            border-left-color: #2ed573;
            opacity: 0.6;
        }
        
        .task-item.done .checkbox {
            background: #2ed573;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #00d4aa;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 212, 170, 0.2);
        }
        
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #00d4aa;
        }
        
        .tab.active {
            color: #00d4aa;
            border-bottom-color: #00d4aa;
        }
        
        .content-area {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .content-area h3 {
            color: #00d4aa;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .content-area code {
            background: rgba(0, 212, 170, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            color: #00d4aa;
        }
        
        .content-area pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4aa, #2ed573);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: width 0.5s ease;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 170, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 170, 0.7);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Ultimate Wallet Recovery - Planning Dashboard</h1>
        <p>Qt6 Migration Planning & Status Tracking</p>
    </div>
    
    <div class="container">
        <!-- Stats Overview -->
        <div class="stats">
            <div class="stat-box">
                <div class="number" id="total-tasks">0</div>
                <div class="label">Total Tasks</div>
            </div>
            <div class="stat-box">
                <div class="number" id="completed-tasks">0</div>
                <div class="label">Completed</div>
            </div>
            <div class="stat-box">
                <div class="number" id="pending-tasks">0</div>
                <div class="label">Pending</div>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="card">
            <h2>📊 Migration Progress</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%">0%</div>
            </div>
        </div>
        
        <!-- Main Grid -->
        <div class="dashboard-grid">
            <!-- Left: Tasks -->
            <div class="card">
                <h2>📋 Current Tasks</h2>
                <div class="task-list" id="task-list">
                    <div class="loading">Loading tasks...</div>
                </div>
            </div>
            
            <!-- Right: Documentation -->
            <div class="card">
                <h2>📚 Documentation</h2>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('status')">Migration Status</button>
                    <button class="tab" onclick="switchTab('plan')">Migration Plan</button>
                    <button class="tab" onclick="switchTab('copilot')">Copilot Instructions</button>
                </div>
                <div class="content-area" id="content-area">
                    <div class="loading">Loading documentation...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentTab = 'status';
        
        // Load tasks
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const data = await response.json();
                
                document.getElementById('total-tasks').textContent = data.total;
                document.getElementById('completed-tasks').textContent = data.completed;
                document.getElementById('pending-tasks').textContent = data.pending;
                
                const progress = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
                const progressFill = document.getElementById('progress-fill');
                progressFill.style.width = progress + '%';
                progressFill.textContent = progress + '%';
                
                const taskList = document.getElementById('task-list');
                taskList.innerHTML = data.tasks.map(task => `
                    <div class="task-item ${task.done ? 'done' : ''}">
                        <div class="checkbox"></div>
                        <div>${task.text}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }
        
        // Switch documentation tab
        async function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Load content
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                let endpoint;
                if (tab === 'status') endpoint = '/api/migration-status';
                else if (tab === 'plan') endpoint = '/api/migration-plan';
                else if (tab === 'copilot') endpoint = '/api/copilot-instructions';
                
                const response = await fetch(endpoint);
                const data = await response.json();
                contentArea.innerHTML = data.html;
            } catch (error) {
                contentArea.innerHTML = '<div class="loading">Error loading content</div>';
                console.error('Error loading content:', error);
            }
        }
        
        // Initial load
        loadTasks();
        switchTab('status');
        
        // Auto-refresh every 30 seconds
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
